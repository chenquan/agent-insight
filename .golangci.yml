version: "2"

linters:
  enable:
    - errcheck
    - staticcheck
    - govet
  exclusions:
    presets:
      - std-error-handling
    rules:
      # fmt.Fprintf to io.Writer: ignoring errors is standard practice
      - linters:
          - errcheck
        text: "Error return value of `fmt.Fprint"
      # defer Close(): ignoring error is standard practice
      - linters:
          - errcheck
        text: "Error return value of `.*Close`"
